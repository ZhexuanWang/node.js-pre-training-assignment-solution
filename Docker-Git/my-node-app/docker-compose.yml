version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: mongo-db
    networks:
      - app-network
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    networks:
      - app-network
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb  # ← service name!
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass123
    depends_on:
      - mongodb

volumes:
  mongo-data:

networks:
  app-network:
    external: true